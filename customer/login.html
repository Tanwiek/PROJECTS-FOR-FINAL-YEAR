<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMT Manager - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="images/logo.jpeg" alt="TMT Logo" style="width: 60px; height: auto; border-radius: 50%; margin-bottom: 1rem; border: 2px solid #3b82f6; background: white; padding: 2px;">
                <h1>TMT <span>Manager</span></h1>
                <p>Bon retour ! Veuillez vous connecter à votre compte.</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" name="email"  required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password"  required>
                </div>
                <div id="loginError" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span>Se connecter</span>
                    <div class="spinner" style="display: none;"></div>
                </button>
            </form>
            <div class="login-footer">
                <p>Système protégé. Personnel autorisé uniquement.</p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
