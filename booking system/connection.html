<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNEXION</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height:100vh ;
            margin: 0;
        }
        .box{
            background: rgb(53, 112, 117);
            padding: 25px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0,0, 0,1);
        }
        h2{
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
        }
        label{
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }
        input{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        button{
            width: 100%;
            padding: 10px;
            background: #689739;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #4338;
        }
        </style>
</head>
<body>
    <div class="box">
        <h2>CONNEXION</h2>
